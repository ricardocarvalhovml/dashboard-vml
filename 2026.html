<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vml company · 2026</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- External libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- Client config -->
  <script>
    const CLIENT_NAME = 'vml company';
    const ACCOUNT     = 'vmlcompany';
  </script>
</head>

<!-- data-initial-view faz o app.js abrir a visão anual de 2026 automaticamente -->
<body data-initial-view="view-annual-2026">

  <!-- Loading screen -->
  <div id="app-loading">
    <div class="spinner"></div>
    <p>carregando dados...</p>
  </div>

  <!-- App shell -->
  <div id="app">
    <div class="layout" id="layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <button class="hamburger" id="hamburger" title="Menu">
            <span></span><span></span><span></span>
          </button>
          <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="alternar tema">
            <span id="theme-icon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          </button>
          <img class="sidebar-logo" id="sidebar-logo" src="logo-escuro.png" alt="vml company"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="logo-fallback" style="display:none">vml company</span>
        </div>

        <div class="sidebar-body">
          <button class="nav-home" id="btn-home" onclick="showView('view-home')">⌂ Home</button>
          <div class="sidebar-section" style="cursor:default">mensal</div>
          <div id="monthNav"></div>
          <button class="nav-tab" id="btn-annual" style="display:none"></button>
          <!-- Copyright credit -->
          <div class="sidebar-credit">
            <span>desenvolvido por</span>
            <img src="copyright-logo.png" alt="Temeron" onerror="this.style.display='none'">
          </div>
        </div>
      </aside>

      <!-- Main content (rendered by app.js) -->
      <main class="main" id="mainContent"></main>

    </div>
  </div>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>
