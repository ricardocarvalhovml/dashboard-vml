<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mídia paga — vml company</title>
  <link rel="icon" href="/assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    .funnel-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .funnel-stage-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
    .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; }
    .kpi-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
    .kpi-card.c-blue::before { background:#391bce; }
    .kpi-card.c-purple::before { background:#a038f2; }
    .kpi-card.c-lilac::before { background:#c9b8f8; }
    .kpi-card.c-orange::before { background:#f2a038; }
    .kpi-card.c-teal::before { background:#38c9b8; }
    .kpi-card.c-green::before { background:#a2e259; }
    .kpi-label { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .kpi-value { font-size:36px; font-weight:600; line-height:1; }
    .kpi-value.c-blue   { color:#391bce; }
    .kpi-value.c-purple { color:#a038f2; }
    .kpi-value.c-lilac  { color:#c9b8f8; }
    .kpi-value.c-orange { color:#f2a038; }
    .kpi-value.c-teal   { color:#38c9b8; }
    .kpi-value.c-green  { color:#a2e259; }
    .kpi-sub { font-size:12px; color:var(--muted); margin-top:6px; }
    .comparativo-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .comp-label { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .comp-value { font-size:28px; font-weight:600; }
    .comp-sub { font-size:12px; color:var(--muted); margin-top:4px; }
    .comp-variacao { color:#a2e259; font-size:22px; font-weight:600; }
    .comp-variacao-sub { font-size:12px; color:#a2e259; margin-top:4px; }
    .section-title { display:flex; align-items:center; gap:10px; font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#c9b8f8; margin-bottom:14px; }
    .section-title::before { content:''; display:block; width:3px; height:14px; background:#c9b8f8; border-radius:2px; }
    .campanha-table { width:100%; border-collapse:collapse; }
    .campanha-table th { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); text-align:left; padding:0 12px 12px; font-weight:600; }
    .campanha-table th.right { text-align:right; }
    .campanha-row td { padding:14px 12px; border-top:1px solid var(--border); vertical-align:middle; }
    .campanha-row.parent td { font-weight:600; }
    .campanha-row.child td { padding-left:28px; font-size:13px; color:var(--muted); border-top:1px solid rgba(255,255,255,.04); }
    [data-theme="light"] .campanha-row.child td { border-top-color:rgba(0,0,0,.04); }
    .leads-badge { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:22px; border-radius:11px; background:#391bce; color:#fff; font-size:11px; font-weight:700; padding:0 7px; }
    .campanha-row.child .leads-badge { background:transparent; color:var(--muted); font-weight:400; padding:0; }
    .distrib-bar-bg { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .distrib-bar-fill { height:100%; background:#391bce; border-radius:2px; }
    .campanha-row.child .distrib-bar-fill { background:#6b5fd4; opacity:.6; }
    .pct-text { font-size:12px; color:var(--muted); min-width:36px; text-align:right; }
    .source-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .anuncios-badge { background:#c9b8f820; color:#c9b8f8; border:1px solid #c9b8f840; border-radius:20px; padding:3px 12px; font-size:11px; font-weight:600; }
    .anuncios-table { width:100%; border-collapse:collapse; }
    .anuncios-table th { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); text-align:left; padding:0 10px 12px; font-weight:600; cursor:pointer; white-space:nowrap; user-select:none; }
    .anuncios-table th:hover { color:var(--beige); }
    .anuncios-table th.right { text-align:right; }
    .anuncios-table td { padding:12px 10px; border-top:1px solid var(--border); font-size:13px; vertical-align:middle; }
    .anuncios-table td.right { text-align:right; }
    .ad-format-tag { display:inline-block; font-size:9px; font-weight:700; letter-spacing:.06em; padding:2px 6px; border-radius:4px; text-transform:uppercase; background:#391bce22; color:#c9b8f8; border:1px solid #c9b8f830; }
    .ad-format-tag.video { background:#f2a03822; color:#f2a038; border-color:#f2a03830; }
    .ad-campanha { font-size:11px; color:var(--muted); margin-top:2px; }
    .ad-name { font-weight:600; font-size:13px; }
    .conv-bar-bg { width:60px; height:3px; background:var(--border); border-radius:2px; display:inline-block; vertical-align:middle; }
    .conv-bar-fill { height:100%; background:#a2e259; border-radius:2px; }
    .cpa-green { color:#a2e259; font-weight:600; }
    .cpa-orange { color:#f2a038; font-weight:600; }
    .cpa-red { color:#e05555; font-weight:600; }
    .filters-bar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .filter-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:13px; color:var(--beige); font-family:var(--font); outline:none; min-width:180px; }
    .filter-input::placeholder { color:var(--muted); }
    .filter-select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:13px; color:var(--beige); font-family:var(--font); outline:none; cursor:pointer; }
    .filter-label { font-size:12px; color:var(--muted); }
    .data-footnote { text-align:center; font-size:11px; color:var(--muted); margin-top:12px; opacity:.7; }
    @media(max-width:768px){.funnel-row,.funnel-stage-row{grid-template-columns:1fr 1fr;}.comparativo-row{grid-template-columns:1fr;gap:8px;}}
  </style>
</head>
<body>
  <div id="app-loading"><div class="spinner"></div><p>carregando dados...</p></div>
  <div id="app" style="display:none">
    <div class="layout" id="layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <button class="hamburger" id="hamburger" title="menu"><span></span><span></span><span></span></button>
          <button class="theme-toggle" onclick="toggleTheme()" title="alternar tema"><span id="theme-icon"></span></button>
          <img class="sidebar-logo" id="sidebar-logo" src="/assets/img/logo-escuro.png" alt="vml company" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="logo-fallback" style="display:none">vml company</span>
        </div>
        <div class="sidebar-body">
          <div class="sidebar-nav-top">
            <a class="nav-home" href="/" style="text-decoration:none;display:flex;align-items:center;gap:8px">
              <span class="nav-icon" style="background:rgba(160,56,242,.18);color:#a038f2"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>home
            </a>
            <div class="sidebar-section" id="areas-toggle" onclick="toggleAreas()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">áreas <span class="chev" style="font-size:8px;opacity:.5;transition:transform .2s">▾</span></div>
            <div id="areas-list">
              <a class="nav-tab" href="/pages/redes-sociais" style="text-decoration:none"><span class="nav-icon" style="background:#a038f2"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg></span>redes sociais</a>
              <a class="nav-tab" href="/pages/seo" style="text-decoration:none"><span class="nav-icon" style="background:#a2e259"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#07091a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>seo</a>
              <a class="nav-tab" href="/pages/crm" style="text-decoration:none"><span class="nav-icon" style="background:#391bce"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>crm</a>
              <a class="nav-tab active" href="/pages/midia-paga" style="text-decoration:none"><span class="nav-icon" style="background:#c9b8f8"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#07091a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>mídia paga</a>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section" id="periodo-toggle" onclick="togglePeriodo()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">período <span class="chev" style="font-size:8px;opacity:.5;transition:transform .2s">▾</span></div>
            <div id="periodo-list"><div id="monthNav"></div></div>
          </div>
          <div class="sidebar-nav-bottom">
            <a class="nav-upload" href="/pages/upload"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:-2px;flex-shrink:0"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>enviar relatório</a>
            <div class="sidebar-credit"><div><div class="credit-brand">vml company</div><div class="credit-copy">© 2026 todos os direitos<br>reservados.</div></div></div>
          </div>
        </div>
      </aside>
      <main class="main">
        <div class="page-header">
          <div>
            <div class="page-eyebrow" id="page-eyebrow">mídia paga</div>
            <div class="page-title">mídia paga</div>
            <div class="page-sub">funil crm · meta ads · campanhas</div>
          </div>
        </div>
        <div id="midia-content"></div>
      </main>
    </div>
  </div>

  <script>
  (function(){const s=localStorage.getItem('dashboard-theme')||'';document.documentElement.dataset.theme=s;const l=document.getElementById('sidebar-logo');if(l)l.src=s==='light'?'/assets/img/logo-escuro.png':'/assets/img/logo.png';const ic=document.getElementById('theme-icon');if(ic)ic.innerHTML=s==='light'?'<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>';})();
  function toggleAreas(){var e=document.getElementById('areas-list');e.classList.toggle('coll');var c=document.querySelector('#areas-toggle .chev');if(c)c.style.transform=e.classList.contains('coll')?'rotate(-90deg)':'';}
  function togglePeriodo(){var e=document.getElementById('periodo-list');e.classList.toggle('coll');var c=document.querySelector('#periodo-toggle .chev');if(c)c.style.transform=e.classList.contains('coll')?'rotate(-90deg)':'';}
  function toggleTheme(){const h=document.documentElement;const l=h.dataset.theme==='light';h.dataset.theme=l?'':'light';localStorage.setItem('dashboard-theme',h.dataset.theme);const i=document.getElementById('sidebar-logo');if(i)i.src=h.dataset.theme==='light'?'/assets/img/logo-escuro.png':'/assets/img/logo.png';}
  document.addEventListener('DOMContentLoaded',()=>{const hb=document.getElementById('hamburger');const la=document.getElementById('layout');if(hb&&la)hb.addEventListener('click',()=>la.classList.toggle('sidebar-closed'));});

  const _MO=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const _YEARS=[2022,2023,2024,2025,2026,2027,2028,2029,2030];
  let _mainData=null,_anunciosData=null,_campanhasData=null;
  let _adSortKey='Conversoes',_adSortDir=-1;

  function parseCsv(text){return new Promise(res=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:r=>res(r.data)});});}
  function n(v){return parseFloat(v)||0;}
  function fmtBRL(v){return 'R$ '+n(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function fmtK(v){const x=n(v);return x>=1000?(x/1000).toFixed(1)+'k':x.toLocaleString('pt-BR');}

  async function loadMonth(year,month){
    const base=`/assets/data/${year}/${String(month).padStart(2,'0')}`;
    const [mR,aR,cR]=await Promise.allSettled([
      fetch(base+'/midia-paga.csv').then(r=>r.ok?r.text():Promise.reject()),
      fetch(base+'/midia-paga-anuncios.csv').then(r=>r.ok?r.text():Promise.reject()),
      fetch(base+'/midia-paga-campanhas.csv').then(r=>r.ok?r.text():Promise.reject()),
    ]);
    _mainData=mR.status==='fulfilled'?await parseCsv(mR.value):null;
    _anunciosData=aR.status==='fulfilled'?await parseCsv(aR.value):null;
    _campanhasData=cR.status==='fulfilled'?await parseCsv(cR.value):null;
    render(year,month);
  }

  function render(year,month){
    const el=document.getElementById('midia-content');
    if(!_mainData||!_mainData[0]){el.innerHTML='<div class="card" style="padding:32px;text-align:center;color:var(--muted)">nenhum dado encontrado.</div>';return;}
    const d=_mainData[0];
    document.getElementById('page-eyebrow').textContent=`${_MO[month-1]} ${year}`;

    const mqlPct=d.MQL&&d.Leads?((n(d.MQL)/n(d.Leads))*100).toFixed(1):'—';
    const sqlPct=d.SQL&&d.MQL?((n(d.SQL)/n(d.MQL))*100).toFixed(1):'—';
    const convTx=d.Reuniao_Agendada&&d.Leads?((n(d.Reuniao_Agendada)/n(d.Leads))*100).toFixed(1):'—';
    const varL=n(d.Semana_Atual)-n(d.Semana_Anterior);
    const varP=n(d.Semana_Anterior)?((varL/n(d.Semana_Anterior))*100).toFixed(1):0;

    // Group campaigns
    const grps={};
    if(_campanhasData){_campanhasData.forEach(r=>{if(!grps[r.Campanha])grps[r.Campanha]={leads:0,pct:n(r.Percentual_Campanha),fontes:[]};grps[r.Campanha].leads+=n(r.Leads);grps[r.Campanha].fontes.push(r);});}
    const totalLeads=Object.values(grps).reduce((a,g)=>a+g.leads,0)||n(d.Leads);
    const numCamp=Object.keys(grps).length;

    el.innerHTML=`
    <div class="section-title">leads · funil de conversão</div>
    <div class="funnel-row">
      <div class="kpi-card c-blue"><div class="kpi-label">leads</div><div class="kpi-value c-blue">${n(d.Leads).toLocaleString('pt-BR')}</div><div class="kpi-sub">${numCamp} campanha${numCamp!==1?'s':''}</div></div>
      <div class="kpi-card c-purple"><div class="kpi-label">mql</div><div class="kpi-value c-purple">${n(d.MQL).toLocaleString('pt-BR')}</div><div class="kpi-sub">${mqlPct}% do total</div></div>
      <div class="kpi-card c-lilac"><div class="kpi-label">sql</div><div class="kpi-value c-lilac">${n(d.SQL).toLocaleString('pt-BR')}</div><div class="kpi-sub">${sqlPct}% do mql</div></div>
    </div>
    <div class="funnel-stage-row">
      <div class="kpi-card" style="border-top:3px solid #f2a038"><div class="kpi-label">lead recebido</div><div class="kpi-value c-orange" style="color:#f2a038">${n(d.Lead_Recebido).toLocaleString('pt-BR')}</div><div class="kpi-sub">aguardando 1º contato</div></div>
      <div class="kpi-card" style="border-top:3px solid #f2a038"><div class="kpi-label">qualificação inicial</div><div class="kpi-value" style="color:#f2a038">${n(d.Qualificacao_Inicial).toLocaleString('pt-BR')}</div><div class="kpi-sub">em qualificação</div></div>
      <div class="kpi-card" style="border-top:3px solid #38c9b8"><div class="kpi-label">oportunidade</div><div class="kpi-value" style="color:#38c9b8">${n(d.Oportunidade).toLocaleString('pt-BR')}</div><div class="kpi-sub">avançados no funil</div></div>
      <div class="kpi-card c-green"><div class="kpi-label">reunião agendada</div><div class="kpi-value c-green">${n(d.Reuniao_Agendada).toLocaleString('pt-BR')}</div><div class="kpi-sub">${convTx}% taxa de conversão</div></div>
    </div>
    <div class="card section-gap" style="margin-bottom:16px">
      <div class="section-title">comparativo semanal</div>
      <div class="comparativo-row">
        <div><div class="comp-label">semana passada</div><div class="comp-value">${n(d.Semana_Atual).toLocaleString('pt-BR')}</div><div class="comp-sub">leads</div></div>
        <div><div class="comp-label">semana retrasada</div><div class="comp-value">${n(d.Semana_Anterior).toLocaleString('pt-BR')}</div><div class="comp-sub">leads</div></div>
        <div><div class="comp-label">variação</div><div class="comp-variacao">▲ +${varL} leads</div><div class="comp-variacao-sub">+${varP}% em relação à semana anterior</div></div>
      </div>
    </div>
    <div class="card section-gap" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">campanha × fonte de origem</div>
      </div>
      <table class="campanha-table">
        <thead><tr><th>campanha / fonte origem</th><th class="right">leads</th><th class="right">%</th><th>distribuição</th></tr></thead>
        <tbody id="campanha-tbody"></tbody>
      </table>
    </div>
    <div class="card section-gap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">meta ads · top anúncios · campanhas de conversões · ${_MO[month-1]} ${year}</div>
        <span class="anuncios-badge" id="anuncios-count">— anúncios</span>
      </div>
      <div class="filters-bar">
        <span class="filter-label">filtrar:</span>
        <input class="filter-input" id="filter-search" placeholder="buscar anúncio ou campanha…">
        <select class="filter-select" id="filter-campanha"><option value="">todas as campanhas</option></select>
        <select class="filter-select" id="filter-formato"><option value="">todos os formatos</option></select>
      </div>
      <div style="overflow-x:auto">
        <table class="anuncios-table" id="anuncios-table">
          <thead><tr>
            <th>anúncio</th>
            <th class="right" data-k="Gasto">gasto ↕</th>
            <th class="right" data-k="Impressoes">impressões ↕</th>
            <th class="right" data-k="Alcance">alcance ↕</th>
            <th class="right" data-k="Frequencia">freq. ↕</th>
            <th class="right" data-k="Taxa_Cliques">taxa cliques ↕</th>
            <th class="right" data-k="Conversoes">conversões ↕</th>
            <th class="right" data-k="CPA">cpa ↕</th>
          </tr></thead>
          <tbody id="anuncios-tbody"></tbody>
        </table>
      </div>
      <div class="data-footnote">dados meta ads · ${_MO[month-1]} ${year} (1–16/${String(month).padStart(2,'0')}) · campanhas de conversões, tráfego e engajamento</div>
    </div>`;

    renderCampanhas(grps,totalLeads);
    if(_anunciosData)renderAnuncios();

    document.querySelectorAll('#anuncios-table th[data-k]').forEach(th=>{
      th.addEventListener('click',()=>{const k=th.dataset.k;_adSortDir=(k===_adSortKey)?-_adSortDir:-1;_adSortKey=k;renderAnuncios();});
    });
    ['filter-search','filter-campanha','filter-formato'].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener('input',renderAnuncios);});
  }

  function renderCampanhas(groups,total){
    const tb=document.getElementById('campanha-tbody');
    if(!tb)return;
    let html='';
    Object.entries(groups).sort((a,b)=>b[1].leads-a[1].leads).forEach(([camp,g])=>{
      const pct=total?((g.leads/total)*100).toFixed(1):0;
      html+=`<tr class="campanha-row parent"><td>${camp}</td><td class="right"><span class="leads-badge">${g.leads}</span></td><td class="right pct-text">${pct}%</td><td><div style="display:flex;align-items:center"><div class="distrib-bar-bg" style="flex:1"><div class="distrib-bar-fill" style="width:${Math.round(n(pct))}%"></div></div></div></td></tr>`;
      g.fontes.forEach(f=>{
        const dc=f.Fonte.includes('Facebook')||f.Fonte.includes('meta')?'#391bce':f.Fonte.includes('google')||f.Fonte.includes('Google')?'#a2e259':f.Fonte.includes('Direto')?'#c9b8f8':f.Fonte.includes('Eventos')?'#f2a038':'#8b86a8';
        html+=`<tr class="campanha-row child"><td><div style="display:flex;align-items:center;gap:8px"><span class="source-dot" style="background:${dc}"></span>${f.Fonte}</div></td><td class="right">${n(f.Leads)}</td><td class="right pct-text">${n(f.Percentual_Fonte)}%</td><td><div style="display:flex;align-items:center"><div class="distrib-bar-bg" style="flex:1"><div class="distrib-bar-fill" style="width:${Math.round(n(f.Percentual_Fonte))}%"></div></div></div></td></tr>`;
      });
    });
    tb.innerHTML=html;
  }

  function renderAnuncios(){
    if(!_anunciosData)return;
    const search=(document.getElementById('filter-search')?.value||'').toLowerCase();
    const cf=document.getElementById('filter-campanha')?.value||'';
    const ff=document.getElementById('filter-formato')?.value||'';
    const cs=document.getElementById('filter-campanha');
    const fs=document.getElementById('filter-formato');
    if(cs&&cs.options.length===1){[...new Set(_anunciosData.map(r=>r.Campanha))].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});}
    if(fs&&fs.options.length===1){[...new Set(_anunciosData.map(r=>r.Formato))].forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f.toLowerCase();fs.appendChild(o);});}
    let rows=_anunciosData.filter(r=>{
      if(search&&!r.Anuncio.toLowerCase().includes(search)&&!r.Campanha.toLowerCase().includes(search))return false;
      if(cf&&r.Campanha!==cf)return false;
      if(ff&&r.Formato!==ff)return false;
      return true;
    });
    rows.sort((a,b)=>(n(a[_adSortKey])-n(b[_adSortKey]))*_adSortDir);
    const mx=Math.max(..._anunciosData.map(r=>n(r.Conversoes)));
    const cnt=document.getElementById('anuncios-count');
    if(cnt)cnt.textContent=`${rows.length} anúncio${rows.length!==1?'s':''}`;
    const tb=document.getElementById('anuncios-tbody');
    if(!tb)return;
    tb.innerHTML=rows.map(r=>{
      const cpa=n(r.CPA);
      const cc=cpa<10?'cpa-green':cpa<20?'cpa-orange':'cpa-red';
      const cw=mx?Math.round((n(r.Conversoes)/mx)*100):0;
      const iv=r.Formato==='Vídeo';
      return `<tr>
        <td><div class="ad-name">${r.Anuncio}</div><div style="margin-top:4px;display:flex;align-items:center;gap:6px"><span class="ad-format-tag${iv?' video':''}">${r.Formato}</span><span class="ad-campanha">${r.Campanha}</span></div></td>
        <td class="right">${fmtBRL(r.Gasto)}</td>
        <td class="right">${fmtK(r.Impressoes)}</td>
        <td class="right">${fmtK(r.Alcance)}</td>
        <td class="right">${n(r.Frequencia).toFixed(2)}</td>
        <td class="right">${n(r.Taxa_Cliques).toFixed(2)}%</td>
        <td class="right"><div class="conv-bar-bg" style="margin-right:6px"><div class="conv-bar-fill" style="width:${cw}%"></div></div><strong style="color:#a2e259">${n(r.Conversoes).toLocaleString('pt-BR')}</strong></td>
        <td class="right"><span class="${cc}">${fmtBRL(r.CPA)}</span></td>
      </tr>`;
    }).join('');
  }

  async function buildNav(){
    const nav=document.getElementById('monthNav');
    if(!nav)return;
    const found=[];
    for(const y of _YEARS){for(let m=1;m<=12;m++){try{const r=await fetch(`/assets/data/${y}/${String(m).padStart(2,'0')}/midia-paga.csv`,{method:'HEAD'});if(r.ok)found.push({year:y,month:m});}catch(e){}}}
    if(!found.length){nav.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 12px">nenhum dado</div>';return;}
    const byY={};
    found.forEach(({year,month})=>{if(!byY[year])byY[year]=[];byY[year].push(month);});
    let allBtns=[];
    Object.keys(byY).sort().forEach(y=>{
      const sec=document.createElement('div');sec.className='sidebar-section year-header';sec.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:4px';sec.innerHTML=`<span style="flex:1">${y}</span>`;nav.appendChild(sec);
      const grp=document.createElement('div');grp.className='year-group';
      byY[y].forEach(m=>{const btn=document.createElement('button');btn.className='nav-tab';btn.innerHTML=`<span class="nav-dot" style="background:#c9b8f8"></span>${_MO[m-1]}`;btn.onclick=()=>{allBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadMonth(Number(y),m);};grp.appendChild(btn);allBtns.push(btn);});
      nav.appendChild(grp);requestAnimationFrame(()=>{grp.style.maxHeight=grp.scrollHeight+'px';});
    });
    const latest=found[found.length-1];
    if(allBtns.length)allBtns[allBtns.length-1].classList.add('active');
    await loadMonth(latest.year,latest.month);
  }

  document.addEventListener('DOMContentLoaded',async()=>{
    try{await buildNav();}catch(e){console.error(e);}
    finally{document.getElementById('app-loading').style.display='none';document.getElementById('app').style.display='';}
  });
  </script>
</body>
</html>
