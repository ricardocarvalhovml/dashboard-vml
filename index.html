<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vml company · Home</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- External libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- Client config -->
  <script>
    const CLIENT_NAME = 'vml company';
    const ACCOUNT     = 'vmlcompany';
  </script>
</head>

<body data-initial-view="view-home">

  <!-- Loading screen -->
  <div id="app-loading">
    <div class="spinner"></div>
    <p>Carregando dados...</p>
  </div>

  <!-- App shell -->
  <div id="app">
    <div class="layout" id="layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <button class="hamburger" id="hamburger" title="Menu">
            <span></span><span></span><span></span>
          </button>
          <img class="sidebar-logo" src="logo.png" alt="vml company"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="logo-fallback" style="display:none">vml company</span>
        </div>

        <div class="sidebar-body">
          <button class="nav-home active" id="btn-home" onclick="showView('view-home')">⌂ Home</button>
          <div class="sidebar-section" style="cursor:default">mensal</div>
          <div id="monthNav"></div>
          <!-- btn-annual is hidden via JS after nav is built -->
          <button class="nav-tab" id="btn-annual" style="display:none"></button>
        </div>
      </aside>

      <!-- Main content (rendered by app.js) -->
      <main class="main" id="mainContent"></main>

    </div>
  </div>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>
